name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Image Name (lowercase)
        id: prep
        run: |
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Remote Docker Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: dmitri
          port: 3173
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e


            IMAGE="ghcr.io/${{ steps.prep.outputs.repo_lower }}:lab3"
            CONTAINER_NAME="catty-app"
            HOST_PORT=8181
            CONTAINER_PORT=8181

            echo "Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling image: $IMAGE"
            docker pull $IMAGE

            echo "Stopping old container..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            echo "Starting new container..."
            docker run -d \
              --name $CONTAINER_NAME \
              -p $HOST_PORT:$CONTAINER_PORT \
              --restart unless-stopped \
              -e DEPLOY_REF=${{ github.sha }} \
              $IMAGE

            echo "Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy complete: $IMAGE"
