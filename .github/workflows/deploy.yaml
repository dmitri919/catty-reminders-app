name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: dmitri
          port: 3173
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # export
            export DEPLOY_REF=${{ github.sha }}
            export IMAGE=ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}

            export APP_CONTAINER_NAME=catty-app
            export DB_CONTAINER_NAME=catty-db

            export MARIADB_ROOT_PASSWORD=mypass
            export MARIADB_USER=dmitri
            export MARIADB_PASSWORD=mypass
            export MARIADB_DATABASE=catty_reminders
            export HOST_DB_PORT=3306
            export CONTAINER_DB_PORT=3306

            export HOST_APP_PORT=8181
            export CONTAINER_APP_PORT=8181

            echo "Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Deploying stack with Docker Compose..."
            cd /home/dmitri/app
            docker compose pull
            docker compose up -d --remove-orphans --force-recreate

            echo "✅ Deploy complete: $IMAGE"
