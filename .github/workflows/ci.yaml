name: CI

on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        run: docker run --rm -i hadolint/hadolint hadolint - < Dockerfile

  # тесты приложения (с БД)
  pipeline:
    needs: docker-lint
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11.8.6-ubi9
        env:
          MARIADB_ROOT_PASSWORD: mypass
          MARIADB_DATABASE: catty_reminders
        ports: [ 3306:3306 ]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt uvicorn pytest-playwright mysql-connector-python
          playwright install --with-deps chromium

      - name: Patch config for CI
        run: sed -i 's/"host": "db"/"host": "127.0.0.1"/g' config.json

      - name: Start app
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > server.log 2>&1 &
          sleep 10
          curl -s http://127.0.0.1:8181/login || echo "App may not be ready"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml -v || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
          retention-days: 1

  # сборка и публикация Docker-образа
  docker-build:
    needs: pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:lab4
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
