docker-build:
  runs-on: ubuntu-latest
  needs: pipeline
  if: github.event_name == 'push'
  permissions:
    contents: read
    packages: write
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest

    - name: Prepare Image Name (lowercase)
      id: prep
      run: |
        echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          DEPLOY_REF=${{ github.sha }}
        tags: |
          ghcr.io/${{ steps.prep.outputs.repo_lower }}/catty-reminders-app:lab4
          ghcr.io/${{ steps.prep.outputs.repo_lower }}/catty-reminders-app:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
