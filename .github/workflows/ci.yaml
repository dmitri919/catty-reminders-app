name: CI

on:
  push:
    branches:
      - lab4
      - lab4_autotests*
  pull_request:
    branches:
      - lab4
      - lab4_autotests*

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        run: |
          docker run --rm -i hadolint/hadolint hadolint - < Dockerfile || true

  pipeline:
    needs: docker-lint
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:11.8.6-ubi9
        env:
          MARIADB_ROOT_PASSWORD: mypass
          MARIADB_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pmypass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright mysql-connector-python
          playwright install --with-deps chromium

      - name: Patch config for CI (localhost вместо db)
        run: |
          sed -i 's/"host": "db"/"host": "127.0.0.1"/g' config.json
          cat config.json

      - name: Start app in background
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > server.log 2>&1 &
          echo "Waiting for app to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8181/login | grep -q "Catty"; then
              echo "✅ App is ready!"
              break
            fi
            sleep 2
          done

      - name: Run tests with JUnit report
        env:
          PYTHONPATH: ${{ github.workspace }}
          BASE_URL: http://127.0.0.1:8181
        run: |
          pytest tests/ --junitxml=test_result.xml -v --tb=short

          if [ -f test_result.xml ] && [ -s test_result.xml ]; then
            echo "✅ test_result.xml created successfully"
            head -30 test_result.xml
          else
            echo "❌ test_result.xml is missing or empty!"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
          retention-days: 1


  docker-build:
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
      - name: Prepare Image Name (lowercase)
        id: prep
        run: |
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}/catty-reminders-app:lab4
            ghcr.io/${{ steps.prep.outputs.repo_lower }}/catty-reminders-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
